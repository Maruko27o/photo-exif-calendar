<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#5b7cfa">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="フォトカレンダー">
  <title>📷 フォトカレンダー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <h1>📷 フォトカレンダー</h1>
    <p class="tagline">写真を選ぶだけで、撮影日ごとのカレンダーが完成</p>
  </header>

  <main>
    <!-- 写真選択 -->
    <section class="picker">
      <label for="file-input" class="pick-btn">
        <span class="pick-icon">＋</span>
        <span class="pick-label">写真を選ぶ</span>
        <span class="pick-hint">フォトライブラリから複数選択できます</span>
      </label>
      <input id="file-input" type="file" accept="image/*" multiple hidden>
      <p class="privacy">🔒 写真は端末内だけで処理され、どこにも送信されません</p>
      <p id="notice" class="notice hidden"></p>
    </section>

    <!-- 進捗 -->
    <div id="progress" class="progress hidden">
      <div class="progress-track"><div id="progress-bar" class="progress-bar"></div></div>
      <p id="progress-text" class="progress-text">読み込み中…</p>
    </div>

    <!-- 空状態 -->
    <section id="empty" class="empty">
      <div class="empty-card">
        <div class="empty-emoji">🗓️</div>
        <h2>使い方</h2>
        <ol>
          <li>「写真を選ぶ」をタップ</li>
          <li>カレンダーにしたい写真を複数選ぶ</li>
          <li>撮影日ごとに自動で並びます</li>
        </ol>
        <p class="empty-note">結果は「HTMLで保存」ボタンで書き出して共有できます。</p>
      </div>
    </section>

    <!-- 結果 -->
    <section id="result" class="result hidden">
      <div class="toolbar">
        <p id="summary" class="summary"></p>
        <div class="toolbar-actions">
          <button id="poster-btn" class="btn btn-primary">🖼️ ポスターにする</button>
          <button id="export-btn" class="btn btn-ghost">⬇︎ HTMLで保存</button>
          <button id="reset-btn" class="btn btn-ghost">✕ クリア</button>
        </div>
      </div>

      <div class="month-nav">
        <button id="prev-btn" class="nav-arrow" aria-label="前の月">‹</button>
        <div id="month-title" class="month-title"></div>
        <button id="next-btn" class="nav-arrow" aria-label="次の月">›</button>
      </div>

      <div id="month-chips" class="month-chips"></div>

      <div class="calendar-wrap">
        <table id="calendar" class="calendar"></table>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    写真のEXIF撮影日時から自動生成 ・ オフライン動作
  </footer>

  <!-- ライトボックス -->
  <div id="lightbox" class="lightbox">
    <img id="lightbox-img" alt="">
    <p id="lightbox-cap" class="lightbox-cap"></p>
  </div>

  <!-- ポスター(思い出・印刷用) -->
  <div id="poster" class="poster-overlay">
    <div class="poster-bar">
      <div class="poster-themes">
        <button class="theme-btn active" data-theme="polaroid">ポラロイド</button>
        <button class="theme-btn" data-theme="film">フィルム</button>
        <button class="theme-btn" data-theme="modern">モダン</button>
      </div>
      <div class="poster-bar-actions">
        <button id="poster-save" class="btn btn-primary">📷 写真に保存</button>
        <button id="poster-close" class="btn btn-ghost">✕ 閉じる</button>
      </div>
      <label class="poster-msg-field">
        <span class="poster-msg-icon">♥</span>
        <input id="poster-msg" class="poster-msg-input" type="text" maxlength="40"
               placeholder="ひとことを添える(例: ふたりの6月 / Haru &amp; Yuki)">
      </label>
    </div>
    <div class="poster-scroll">
      <div id="poster-sheet" class="poster-sheet theme-polaroid">
        <div class="poster-head">
          <div id="poster-en" class="poster-en"></div>
          <div id="poster-jp" class="poster-jp"></div>
          <div id="poster-count" class="poster-count"></div>
          <div class="poster-rule"></div>
        </div>
        <div id="poster-grid" class="poster-grid"></div>
        <div id="poster-foot" class="poster-foot">♥ our memories</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
